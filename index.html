<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
:root {
  --bg: #0f0f0f;
  --card: #1a1a1a;
  --accent: #6366f1;
  --text: #ffffff;
  --sub: #9ca3af;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 24px 16px;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.logo {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 1px;
}

.btn-group {
  display: flex;
  gap: 8px;
}

button {
  background: var(--accent);
  border: none;
  width: 36px;
  height: 36px;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-1px);
  opacity: 0.9;
}

.form {
  background: var(--card);
  padding: 14px;
  border-radius: 12px;
  margin-bottom: 20px;
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 8px;
  border-radius: 6px;
  border: none;
  background: #111;
  color: white;
}

.card {
  background: var(--card);
  padding: 16px;
  border-radius: 14px;
  margin-bottom: 14px;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-2px);
}

.title { font-weight: 600; }
.sub { font-size: 12px; color: var(--sub); }

.progress-bar {
  height: 6px;
  background: #333;
  border-radius: 4px;
  margin-top: 10px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #6366f1, #9333ea);
}

.row {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
  align-items: center;
}

select {
  background: #111;
  color: white;
  border: none;
  border-radius: 6px;
}

.green { color: #22c55e; }
.red { color: #ef4444; }

.actions {
  display: flex;
  gap: 6px;
}

/* ===== FAKTUR ===== */
#report {
  position: absolute;
  left: -9999px;
  width: 900px;
  background: white;
  color: black;
  padding: 30px;
  font-family: Arial;
}

.header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

.title-report {
  font-size: 22px;
  font-weight: bold;
}

.meta {
  font-size: 12px;
  text-align: right;
}

.table {
  width: 100%;
  border-collapse: collapse;
}

.table th {
  text-align: left;
  padding: 8px;
  border-bottom: 2px solid #000;
  font-size: 13px;
}

.table td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
  font-size: 12px;
}

.footer {
  margin-top: 20px;
  font-size: 11px;
  color: #555;
}
</style>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <div class="logo">PROJECT TRACKER</div>

    <div class="btn-group">
      <button onclick="toggleForm()">+</button>
      <button onclick="downloadImage()">⬇</button>
    </div>
  </div>

  <div id="form" class="form" style="display:none;">
    <input id="nama" placeholder="Nama Project">
    <input id="po" placeholder="Pemberi PO">
    <button onclick="addProject()">✔</button>
  </div>

  <div id="list"></div>

</div>

<div id="report"></div>

<script>

const steps = [
  "Penawaran","Diskusi","Quotation","PO",
  "BAST","Invoice","Pencairan","PPN"
];

let projects = JSON.parse(localStorage.getItem("jbm_projects")) || [];

function save(){
  localStorage.setItem("jbm_projects", JSON.stringify(projects));
}

function toggleForm(){
  const f=document.getElementById("form");
  f.style.display = f.style.display==="flex"?"none":"flex";
}

function addProject(){
  const nama=document.getElementById("nama").value.trim();
  const po=document.getElementById("po").value.trim();
  if(!nama||!po) return;

  projects.push({
    id:Date.now(),
    nama,po,
    step:1,
    pajak:false,
    last_update:new Date().toLocaleString()
  });

  save(); render();
}

function updateStep(id,val){
  const p=projects.find(x=>x.id===id);
  p.step=parseInt(val);
  if(p.step<8) p.pajak=false;
  p.last_update=new Date().toLocaleString();
  save(); render();
}

function togglePajak(id){
  const p=projects.find(x=>x.id===id);
  if(p.step<8) return;
  p.pajak=!p.pajak;
  p.last_update=new Date().toLocaleString();
  save(); render();
}

function selesaiProject(id){
  const p=projects.find(x=>x.id===id);
  if(!(p.step===8 && p.pajak)) return;
  projects=projects.filter(x=>x.id!==id);
  save(); render();
}

function getProgress(step){
  return (step/8)*100;
}

/* ===== FAKTUR ===== */
async function downloadImage(){

  let rows="";

  projects.forEach((p,i)=>{
    rows+=`
      <tr>
        <td>${i+1}</td>
        <td>${p.nama}</td>
        <td>${p.po}</td>
        <td>${steps[p.step-1]}</td>
        <td>${getProgress(p.step).toFixed(0)}%</td>
        <td>${p.pajak?"Sudah":"Belum"}</td>
      </tr>
    `;
  });

  const report=document.getElementById("report");

  report.innerHTML=`
    <div class="header">
      <div class="title-report">PROJECT REPORT</div>
      <div class="meta">
        Date: ${new Date().toLocaleDateString()}<br>
        Total: ${projects.length}
      </div>
    </div>

    <table class="table">
      <thead>
        <tr>
          <th>No</th>
          <th>Project</th>
          <th>PO</th>
          <th>Step</th>
          <th>Progress</th>
          <th>PPN</th>
        </tr>
      </thead>
      <tbody>
        ${rows}
      </tbody>
    </table>

    <div class="footer">
      Generated by Project Tracker
    </div>
  `;

  const canvas=await html2canvas(report,{scale:2});
  const link=document.createElement("a");
  link.download="project_report.png";
  link.href=canvas.toDataURL();
  link.click();
}

function render(){
  const list=document.getElementById("list");
  list.innerHTML="";

  projects.forEach(p=>{
    const progress=getProgress(p.step);
    const canClose=(p.step===8 && p.pajak);

    list.innerHTML+=`
      <div class="card">
        <div class="title">${p.nama}</div>
        <div class="sub">PO: ${p.po}</div>

        <div class="progress-bar">
          <div class="progress-fill" style="width:${progress}%"></div>
        </div>

        <div class="row">
          <div class="sub">${steps[p.step-1]} (${progress.toFixed(0)}%)</div>

          <select onchange="updateStep(${p.id},this.value)">
            ${steps.map((s,i)=>`
              <option value="${i+1}" ${p.step===i+1?'selected':''}>
                ${i+1}. ${s}
              </option>
            `).join("")}
          </select>
        </div>

        <div class="row">
          <div class="${p.pajak?'green':'red'}">
            ${p.pajak?'PPN: Sudah':'PPN: Belum'}
          </div>

          <div class="actions">
            <button onclick="togglePajak(${p.id})">P</button>
            ${canClose?`<button onclick="selesaiProject(${p.id})">✓</button>`:""}
          </div>
        </div>

        <div class="sub">Update: ${p.last_update}</div>
      </div>
    `;
  });
}

render();

</script>

</body>
</html>
