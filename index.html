<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JBM Project Tracker - Standalone</title>
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Document Parsing Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap');
        
        :root {
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            font-family: var(--font-sans);
            background-color: #f8fafc;
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
        }

        .markdown-chat h1 { font-size: 1rem; font-weight: 900; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: -0.025em; }
        .markdown-chat p { font-size: 0.75rem; line-height: 1.625; margin-bottom: 0.5rem; }
        .markdown-chat strong { font-weight: 900; color: #4f46e5; }
        .markdown-chat table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; font-size: 10px; }
        .markdown-chat th { background: #0f172a; color: white; padding: 0.5rem; text-align: left; font-weight: 700; text-transform: uppercase; border: 1px solid #334155; }
        .markdown-chat td { border: 1px solid #e2e8f0; padding: 0.5rem; vertical-align: top; background: white; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>

    <script>
        // Set up Tailwind config
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Firebase Configuration (From your applet)
        const firebaseConfig = {
            projectId: "gen-lang-client-0435594284",
            appId: "1:356494294342:web:c060463e3415b105977947",
            apiKey: "AIzaSyByzGEUc-reZQ8LUBa3q1WMm899w08doTo",
            authDomain: "gen-lang-client-0435594284.firebaseapp.com",
            storageBucket: "gen-lang-client-0435594284.firebasestorage.app",
            messagingSenderId: "356494294342"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.app().firestore("ai-studio-65b7ba7c-aa10-4f3e-bafc-2b2612e6b27c");

        // Constants
        const STEPS = [
            'Penawaran',
            'Diskusi Pembahasan',
            'Quotation Update',
            'Nego / Survey',
            'Drafting PO',
            'On Going Unit',
            'On Delivery',
            'BAST / Invoice'
        ];

        const STEP_REQUIREMENTS = {
            2: "Rincian Perhitungan",
            3: "Quotation / Penawaran",
            4: "Memo / Berita Acara",
            5: "Draft PO / Kontrak",
            8: "Invoice / BAST"
        };

        // Components
        const Icon = ({ name, className }) => {
            const LucideIcon = lucide.icons[name.charAt(0).toUpperCase() + name.slice(1)];
            return LucideIcon ? <i data-lucide={name} className={className}></i> : null;
        };

        // Helper to refresh lucide icons after render
        const useLucide = () => {
            useEffect(() => {
                lucide.createIcons();
            });
        };

        function App() {
            useLucide();
            const [user, setUser] = useState(null);
            const [projects, setProjects] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchQuery, setSearchQuery] = useState('');
            const [showForm, setShowForm] = useState(false);
            const [activeFilePrompt, setActiveFilePrompt] = useState(null);
            const [formData, setFormData] = useState({ name: '', po: '', company: '' });

            // Auth State
            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return unsubscribe;
            }, []);

            // Firestore Sync
            useEffect(() => {
                if (!user) return;
                const unsubscribe = db.collection('projects')
                    .where('ownerId', '==', user.uid)
                    .onSnapshot((snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setProjects(data.sort((a, b) => b.id - a.id));
                    });
                return unsubscribe;
            }, [user]);

            const handleLogin = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    await auth.signInWithPopup(provider);
                } catch (e) {
                    console.error("Login Error:", e);
                    if (e.code === 'auth/popup-closed-by-user') {
                        // Ignore
                    } else if (e.code === 'auth/unauthorized-domain') {
                        alert("Error: Domain ini belum diizinkan di Firebase Console. Pastikan URL ini sudah ditambahkan ke 'Authorized Domains' di Firebase Authentication.");
                    } else {
                        alert("Login Error: " + e.message);
                    }
                }
            };

            const handleLogout = () => auth.signOut();

            const addProject = async () => {
                if (!formData.name || !formData.company || !formData.po) return;
                
                const id = Date.now();
                const newProject = {
                    id,
                    name: formData.name,
                    company: formData.company,
                    po: formData.po,
                    refNumber: '00',
                    step: 1,
                    pajak: false,
                    lastUpdate: new Date().toLocaleDateString('id-ID'),
                    createdAt: new Date().toISOString(),
                    attachments: [],
                    notes: '',
                    ownerId: user.uid
                };

                try {
                    await db.collection('projects').doc(String(id)).set(newProject);
                    setFormData({ name: '', po: '', company: '' });
                    setShowForm(false);
                } catch (e) {
                    alert("Error adding project: " + e.message);
                }
            };

            const updateProjectField = async (id, field, value) => {
                try {
                    await db.collection('projects').doc(String(id)).update({ [field]: value });
                } catch (e) { console.error(e); }
            };

            const updateStep = async (id, nextStep) => {
                const project = projects.find(p => p.id === id);
                if (!project) return;
                
                const currentStep = project.step;
                if (nextStep > currentStep) {
                    for (let s = currentStep + 1; s <= nextStep; s++) {
                        const hasAttachment = (project.attachments || []).some(a => a.step === s);
                        if (STEP_REQUIREMENTS[s] && !hasAttachment) {
                            setActiveFilePrompt({ id, step: s });
                            return;
                        }
                    }
                }
                updateProjectField(id, 'step', nextStep);
            };

            const togglePajak = (id) => {
                const p = projects.find(proj => proj.id === id);
                if (p) updateProjectField(id, 'pajak', !p.pajak);
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files?.[0];
                if (!file || !activeFilePrompt) return;

                let extractedText = "";
                const reader = new FileReader();
                
                reader.onload = async (event) => {
                    const data = event.target.result;
                    const ext = file.name.split('.').pop().toLowerCase();

                    try {
                        if (ext === 'xlsx' || ext === 'xls' || ext === 'csv') {
                           const workbook = XLSX.read(data, { type: 'binary' });
                           extractedText = XLSX.utils.sheet_to_csv(workbook.Sheets[workbook.SheetNames[0]]);
                        } else if (ext === 'docx') {
                           const result = await mammoth.extractRawText({ arrayBuffer: data });
                           extractedText = result.value;
                        }
                    } catch (err) { console.error("Parsing error", err); }

                    const newAttachment = {
                        step: activeFilePrompt.step,
                        fileName: file.name,
                        uploadDate: new Date().toLocaleDateString('id-ID'),
                        extractedText: extractedText.substring(0, 5000) // Keep it small for firestore
                    };

                    const proj = projects.find(p => p.id === activeFilePrompt.id);
                    const updatedAttachments = [...(proj.attachments || []), newAttachment];
                    
                    await db.collection('projects').doc(String(activeFilePrompt.id)).update({
                        attachments: updatedAttachments,
                        step: activeFilePrompt.step
                    });
                    
                    // Re-check next requirements
                    const nextStepToCheck = activeFilePrompt.step;
                    setActiveFilePrompt(null);
                    // trigger internal step update
                    updateStep(proj.id, nextStepToCheck);
                };

                if (file.name.endsWith('.docx')) {
                    reader.readAsArrayBuffer(file);
                } else {
                    reader.readAsBinaryString(file);
                }
            };

            const deleteProject = async (id) => {
                if(confirm("Purge this project from system logs?")) {
                    await db.collection('projects').doc(String(id)).delete();
                }
            };

            const filteredProjects = projects.filter(p => 
                p.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                p.po.toLowerCase().includes(searchQuery.toLowerCase()) ||
                p.company.toLowerCase().includes(searchQuery.toLowerCase())
            );

            const getFormattedRefNumber = (project) => {
                const date = new Date(project.createdAt);
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const year = date.getFullYear();
                return `${project.refNumber}/JBM/${month}/${year}`;
            };

            if (loading) return <div className="min-h-screen flex items-center justify-center font-black uppercase tracking-widest text-slate-400">System Initializing...</div>;

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950 text-white">
                        <div className="max-w-md w-full text-center space-y-8">
                            <div className="w-20 h-20 bg-indigo-600 rounded-2xl mx-auto flex items-center justify-center text-4xl font-black shadow-2xl shadow-indigo-500/20">J</div>
                            <div>
                                <h1 className="text-2xl font-black tracking-widest uppercase mb-2">JBM <span className="text-indigo-500">Logistics</span></h1>
                                <p className="text-[10px] text-slate-500 font-bold uppercase tracking-[.3em]">Project Governance System v4.1</p>
                            </div>
                            <button 
                                onClick={handleLogin}
                                className="w-full py-4 bg-white text-slate-950 rounded-xl font-black uppercase tracking-widest hover:bg-indigo-50 transition-all flex items-center justify-center gap-3 border border-slate-200 shadow-sm active:scale-95"
                            >
                                <svg className="w-5 h-5 shadow-sm" viewBox="0 0 24 24">
                                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                    <path fill="#FBBC05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.84z"/>
                                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                                </svg>
                                Initiate Session
                            </button>
                            <p className="text-[8px] text-slate-600 font-medium uppercase tracking-widest leading-relaxed opacity-50">
                                Note: If the popup closes instantly, ensure this domain is added to <br/> "Authorized Domains" in your Firebase console.
                            </p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 font-sans selection:bg-indigo-500/30">
                    <header className="h-16 md:h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
                        <div className="max-w-5xl mx-auto h-full px-4 md:px-6 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 md:w-10 md:h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-lg md:text-xl shadow-lg shadow-indigo-200 shrink-0">J</div>
                                <div className="min-w-0">
                                    <h1 className="text-[11px] md:text-sm font-black tracking-[0.15em] md:tracking-[0.2em] uppercase text-slate-800 truncate">JBM <span className="text-indigo-600">Tracker</span></h1>
                                    <p className="text-[8px] md:text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5 truncate">Geometric Balance System</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={handleLogout} className="w-9 h-9 md:w-10 md:h-10 bg-slate-50 border border-slate-200 flex items-center justify-center rounded-lg text-slate-500 hover:text-red-500 transition-all shadow-sm active:scale-95">
                                    <Icon name="logOut" className="w-4 h-4 md:w-5 md:h-5" />
                                </button>
                                <button onClick={() => setShowForm(!showForm)} className={`w-9 h-9 md:w-10 md:h-10 flex items-center justify-center rounded-lg transition-all shadow-sm active:scale-95 border ${showForm ? 'bg-indigo-600 text-white border-indigo-600 shadow-indigo-200' : 'bg-slate-50 border-slate-200 text-slate-500 hover:text-indigo-600'}`}>
                                    <Icon name="plus" className={`w-4 h-4 md:w-5 md:h-5 transition-transform ${showForm ? 'rotate-45' : ''}`} />
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 md:px-6 py-6 md:py-10 space-y-6 md:space-y-8">
                        {/* Metrics */}
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-6">
                            <div className="bg-white p-4 border border-slate-200 rounded-xl shadow-sm">
                                <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Total Active</span>
                                <span className="text-xl md:text-2xl font-black text-slate-800">{projects.length}</span>
                            </div>
                            <div className="bg-white p-4 border-l-4 border-l-indigo-600 border-y border-r border-slate-200 rounded-xl shadow-sm">
                                <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest block mb-1 text-indigo-600">Pending</span>
                                <span className="text-xl md:text-2xl font-black text-indigo-600">{projects.filter(p => p.step < 8).length}</span>
                            </div>
                            <div className="bg-white p-4 border border-slate-200 rounded-xl shadow-sm">
                                <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest block mb-1">Finished</span>
                                <span className="text-xl md:text-2xl font-black text-slate-800">{projects.filter(p => p.step === 8).length}</span>
                            </div>
                            <div className="bg-white p-4 border-l-4 border-l-emerald-600 border-y border-r border-slate-200 rounded-xl shadow-sm">
                                <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest block mb-1 text-emerald-600">Verified</span>
                                <span className="text-xl md:text-2xl font-black text-emerald-600">{projects.filter(p => p.pajak).length}</span>
                            </div>
                        </div>

                        {/* Search */}
                        <div className="relative group max-w-2xl mx-auto w-full">
                            <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-300 group-focus-within:text-indigo-500 transition-colors" />
                            <input 
                                type="text"
                                placeholder="FILTER ASSETS BY NAME, PO, OR COMPANY..."
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                className="w-full bg-white border border-slate-200 rounded-xl py-4 pl-12 pr-4 text-[10px] md:text-[11px] font-black tracking-[0.2em] uppercase focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-400 outline-none transition-all placeholder:text-slate-300 shadow-sm"
                            />
                        </div>

                        {/* Add Form */}
                        <AnimatePresence>
                            {showForm && (
                                <motion.div initial={{ height: 0, opacity: 0 }} animate={{ height: 'auto', opacity: 1 }} exit={{ height: 0, opacity: 0 }} className="overflow-hidden">
                                     <div className="bg-white border border-slate-200 rounded-2xl p-6 shadow-xl shadow-slate-200/50 space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 text-slate-900">
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-400">Project Descriptor</label>
                                                <input value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} placeholder="UNIT NAME / SPECIFICATION" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-xs md:text-sm font-bold uppercase tracking-widest outline-none focus:ring-4 focus:ring-indigo-500/5 focus:border-indigo-400 transition-all" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-400">Client / Company</label>
                                                <input value={formData.company} onChange={e => setFormData({...formData, company: e.target.value})} placeholder="ISSUING ENTITY" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-xs md:text-sm font-bold uppercase tracking-widest outline-none focus:ring-4 focus:ring-indigo-500/5 focus:border-indigo-400 transition-all" />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black uppercase tracking-widest text-slate-400">PO Number / Ref</label>
                                                <input value={formData.po} onChange={e => setFormData({...formData, po: e.target.value})} placeholder="PO-000XXX00" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-xs md:text-sm font-bold uppercase tracking-widest outline-none focus:ring-4 focus:ring-indigo-500/5 focus:border-indigo-400 transition-all" />
                                            </div>
                                        </div>
                                        <button onClick={addProject} className="w-full bg-slate-900 text-white py-4 rounded-xl font-black uppercase tracking-[0.3em] hover:bg-indigo-600 transition-all shadow-lg active:scale-95">Deploy Project Entry</button>
                                     </div>
                                </motion.div>
                            )}
                        </AnimatePresence>

                        {/* List */}
                        <div className="space-y-4">
                            {filteredProjects.map(project => (
                                <motion.div key={project.id} layout initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} className="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-all">
                                    <div className="h-1 w-full bg-indigo-500" style={{ backgroundColor: project.pajak ? '#10b981' : '#6366f1' }} />
                                    <div className="p-5 md:p-6 space-y-6">
                                        <div className="flex flex-col md:flex-row md:items-start justify-between gap-4">
                                            <div className="flex-1 space-y-3">
                                                <div className="flex flex-wrap items-center gap-2">
                                                     <div className="h-7 px-3 bg-slate-900 text-white font-black text-[10px] flex items-center rounded-lg uppercase tracking-wider">REF: {getFormattedRefNumber(project)}</div>
                                                     {project.pajak && <div className="h-7 px-3 bg-emerald-50 text-emerald-600 font-bold text-[10px] flex items-center rounded-lg border border-emerald-100 uppercase tracking-widest">VERIFIED</div>}
                                                </div>
                                                <h3 className="text-xl font-black text-slate-800 uppercase leading-none">{project.name}</h3>
                                                <div className="flex flex-wrap gap-2">
                                                    <span className="px-3 py-1.5 bg-indigo-50 text-indigo-600 rounded-lg text-[10px] font-black uppercase border border-indigo-100">{project.company}</span>
                                                    <span className="px-3 py-1.5 bg-slate-50 text-slate-500 rounded-lg text-[10px] font-bold uppercase border border-slate-100">PO: {project.po}</span>
                                                </div>
                                            </div>
                                            <div className="flex flex-col items-end gap-1.5 hidden md:flex">
                                                <span className="text-[10px] font-black uppercase text-slate-400 tracking-[.2em]">Efficiency {Math.round((project.step / 8) * 100)}%</span>
                                                <div className="w-48 h-1.5 bg-slate-100 rounded-full overflow-hidden border border-slate-200/50">
                                                    <div className="h-full bg-indigo-600" style={{ width: `${(project.step / 8) * 100}%` }} />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-slate-50">
                                            <textarea 
                                                value={project.notes} 
                                                onChange={e => updateProjectField(project.id, 'notes', e.target.value)}
                                                placeholder="Input operational notes..."
                                                className="w-full bg-slate-50/50 border border-slate-200/50 rounded-xl p-4 text-xs font-medium focus:bg-white outline-none min-h-[100px] transition-all"
                                            />
                                            <div className="space-y-3">
                                                 <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">Asset Verification Status</span>
                                                 <div className="flex flex-wrap gap-2">
                                                    {[2,3,4,5,8].map(sNum => {
                                                        const isAttached = (project.attachments || []).some(a => a.step === sNum);
                                                        return (
                                                            <div key={sNum} className={`px-3 py-2 rounded-lg text-[9px] font-black border transition-all ${isAttached ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : 'bg-slate-50 text-slate-300 border-slate-100'}`}>
                                                                {STEP_REQUIREMENTS[sNum]}
                                                            </div>
                                                        );
                                                    })}
                                                 </div>
                                            </div>
                                        </div>

                                        <div className="pt-6 border-t border-slate-50 flex flex-col sm:flex-row items-stretch sm:items-center justify-between gap-4">
                                            <div className="flex flex-col sm:flex-row gap-3">
                                                <select value={project.step} onChange={e => updateStep(project.id, parseInt(e.target.value))} className="bg-slate-100 border-transparent rounded-xl px-10 py-3 text-[11px] font-black uppercase tracking-widest outline-none cursor-pointer">
                                                    {STEPS.map((s, idx) => <option key={idx} value={idx+1}>{idx+1}. {s}</option>)}
                                                </select>
                                                <button onClick={() => togglePajak(project.id)} disabled={project.step < 8} className={`h-12 px-6 rounded-xl font-black text-[11px] uppercase tracking-widest border transition-all ${project.step < 8 ? 'text-slate-200 border-slate-50' : project.pajak ? 'bg-emerald-600 text-white border-emerald-600' : 'bg-white text-slate-600 border-slate-200'}`}>Verify PPN</button>
                                            </div>
                                            <div className="flex items-center gap-2">
                                                <button onClick={() => deleteProject(project.id)} className="w-12 h-12 bg-slate-50 text-slate-400 hover:text-red-500 border border-slate-100 rounded-xl flex items-center justify-center transition-all"><Icon name="trash2" className="w-5 h-5" /></button>
                                            </div>
                                        </div>
                                    </div>
                                </motion.div>
                            ))}
                        </div>
                    </main>

                    {/* File Upload Modal */}
                    <AnimatePresence>
                        {activeFilePrompt && (
                            <div className="fixed inset-0 z-[60] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-sm">
                                <motion.div initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0, scale: 0.95 }} className="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl border border-slate-100 text-center">
                                    <div className="w-16 h-16 bg-amber-50 rounded-2xl mx-auto flex items-center justify-center mb-6 text-amber-600 border border-amber-100"><Icon name="alertCircle" className="w-8 h-8" /></div>
                                    <h3 className="text-sm font-black uppercase tracking-widest mb-2">Requirement Protocol</h3>
                                    <p className="text-[11px] text-slate-400 font-medium uppercase tracking-widest leading-relaxed mb-8">Phase {activeFilePrompt.step} mandates the upload of <span className="text-indigo-600 font-black">{STEP_REQUIREMENTS[activeFilePrompt.step]}</span> to proceed.</p>
                                    <label className="block w-full cursor-pointer group">
                                        <div className="border-2 border-dashed border-slate-200 rounded-2xl py-10 group-hover:border-indigo-400 transition-all">
                                            <Icon name="upload" className="w-6 h-6 text-slate-300 mx-auto mb-3" />
                                            <span className="text-[11px] font-black uppercase text-slate-400">Client-Side Upload</span>
                                        </div>
                                        <input type="file" onChange={handleFileUpload} className="hidden" />
                                    </label>
                                    <button onClick={() => setActiveFilePrompt(null)} className="w-full mt-4 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-slate-600">Bypass Protocol</button>
                                </motion.div>
                            </div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
